<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GitFolder — Automatic version history for your folders. A small macOS menu bar app." />
    <title>GitFolder — Automatic version history for folders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Apply color mode before paint to avoid flash
      (function() {
        var m = localStorage.getItem('gitfolder-color-mode');
        var mode = (m === 'light' || m === 'dark') ? m : 'dark';
        document.documentElement.setAttribute('data-color-mode', mode);
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
