<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GitKit makes GitFolder and GitKanban — small, local-first macOS apps built on your own git and GitHub. No accounts, no servers." />
    <title>GitKit — Small Mac apps built on your own git</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Apply color mode before paint to avoid flash
      (function() {
        var m = localStorage.getItem('gitkit-color-mode');
        var mode = (m === 'light' || m === 'dark') ? m : 'dark';
        document.documentElement.setAttribute('data-color-mode', mode);
        document.documentElement.setAttribute('data-theme', mode);
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
