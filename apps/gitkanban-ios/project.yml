name: GitKanban
options:
  bundleIdPrefix: app.hakobs
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: 2
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "38MGF83L2L"

packages:
  # Provider REST transport types used by the UI (GitRepository, OAuth session).
  git-pont:
    url: https://github.com/silvandiepen/git-pont.git
    branch: codex/initial-git-pont-monorepo
  # The shared board model + parsers (mirrors @gitkit/gitkanban-core).
  GitKit:
    path: ../../swift/GitKit
  # The shared GitKanban app layer (AppModel + provider transport), tested once.
  GitKanbanKit:
    path: ../../swift/GitKanbanKit

targets:
  GitKanban:
    type: application
    platform: iOS
    sources:
      - path: GitKanban
    dependencies:
      - package: GitKanbanKit
        product: GitKanbanKit
      - package: git-pont
        product: GitPontCore
      - package: GitKit
        product: GitKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.hakobs.gitkanban
        INFOPLIST_FILE: GitKanban/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: GitKanban/Info.plist
      properties:
        CFBundleDisplayName: GitKanban
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  GitKanbanTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: GitKanban
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
