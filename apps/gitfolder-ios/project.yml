name: GitFolder
options:
  bundleIdPrefix: app.hakobs
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "38MGF83L2L"

packages:
  # iOS transport: hosted git provider REST API via git-pont (no local clone / no shell).
  git-pont:
    url: https://github.com/silvandiepen/git-pont.git
    branch: codex/initial-git-pont-monorepo
  # Shared Swift helpers (KeychainService).
  GitKit:
    path: ../../swift/GitKit

targets:
  GitFolder:
    type: application
    platform: iOS
    sources:
      - path: GitFolder
    dependencies:
      - package: git-pont
        product: GitPontCore
      - package: git-pont
        product: GitPontGitHub
      - package: git-pont
        product: GitPontGitLab
      - package: GitKit
        product: GitKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.hakobs.gitfolder
        INFOPLIST_FILE: GitFolder/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    info:
      path: GitFolder/Info.plist
      properties:
        CFBundleDisplayName: GitFolder
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
