name: GitFolder
options:
  bundleIdPrefix: app.hakobs
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: 5
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "38MGF83L2L"

packages:
  git-pont:
    url: https://github.com/silvandiepen/git-pont.git
    branch: codex/initial-git-pont-monorepo
  GitKit:
    path: ../../swift/GitKit

targets:
  GitFolder:
    type: application
    platform: macOS
    sources:
      - path: GitFolder
    dependencies:
      - package: git-pont
        product: GitPontCore
      - package: git-pont
        product: GitPontGitCLI
      - package: GitKit
        product: GitKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.hakobs.gitfolder
        INFOPLIST_FILE: GitFolder/Info.plist
        CODE_SIGN_ENTITLEMENTS: GitFolder/GitFolder.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: GitFolder/GitFolder.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
    info:
      path: GitFolder/Info.plist
      properties:
        CFBundleDisplayName: GitFolder
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.developer-tools
        ITSAppUsesNonExemptEncryption: false
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright © Sil van Diepen"
  GitFolderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: GitFolder
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
